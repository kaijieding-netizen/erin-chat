    <style>:root {

* {

body {

.controls input,

.controls input[type="search"] {

}

.controls button {

.message-list {

.message.hidden {

.message-time {

.avatar img {
  width: 100%;
  height: 100%;

}

.bubble {

  background: var(--received);
  border-radius: 18px;
  padding: 12px 14px;

  box-shadow: 0 8px 20px rgba(15, 23, 42, 0.06);

.message.sent .bubble {
  background: var(--sent);

.sender-name {

}

.message-content {

.message-text {

}

.message-link-card {

.message-link-card:hover {
  color: #1d4ed8;
}

.inline-emoji {

  height: 22px;
  vertical-align: text-bottom;
  margin: 0 2px;

.message-media {
  border-radius: 14px;

}

.previewable {
  cursor: zoom-in;
}

.message-media.image,
.message-media.emoji {
  max-height: 260px;
  object-fit: contain;
  background: #f1f5f9;
  padding: 6px;
}

.message-media.emoji {
  max-height: 160px;
  width: auto;
}

.message-media.video {

  background: #111827;
}

.message-media.audio {
  width: 260px;
}

.image-preview {

  background: rgba(15, 23, 42, 0.7);
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;

  z-index: 999;

.image-preview.active {

.image-preview img {

.highlight {

.empty {

.scroll-container {

.scroll-container::-webkit-scrollbar-thumb {

    (function(){

      async function sha256(m){var e=new TextEncoder().encode(m);var h=await crypto.subtle.digest('SHA-256',e);return Array.from(new Uint8Array(h)).map(function(b){return b.toString(16).padStart(2,'0')}).join('');}
      function showContent(){
        document.getElementById('lockScreen').style.display='none';

      function unlock(){
        var p=document.getElementById('pwdInput').value;
        sha256(p).then(function(h){
          if(h===hash){
            showContent();
            sessionStorage.setItem('erin_unlocked','1');
          }else{
            document.getElementById('pwdError').textContent='密码错误，请重试';
            document.getElementById('pwdInput').value='';
            document.getElementById('pwdInput').style.borderColor='#ef4444';
          }
        });
      }
      document.addEventListener('DOMContentLoaded',function(){
        document.getElementById('pwdBtn').addEventListener('click',unlock);
        document.getElementById('pwdInput').addEventListener('keydown',function(e){if(e.key==='Enter')unlock();});

      });
    })();

    <script>
       
      class ChunkedRenderer {
        constructor(container, data, renderItem) {
          this.container = container;
          this.data = data;
          this.renderItem = renderItem;
          this.batchSize = 100;
          this.rendered = 0;
          this.loading = false;

          this.list = document.createElement('div');
          this.list.className = 'message-list';
          this.container.appendChild(this.list);

          this.sentinel = document.createElement('div');
          this.sentinel.className = 'load-sentinel';
          this.container.appendChild(this.sentinel);

          this.renderBatch();

          this.observer = new IntersectionObserver((entries) => {
            if (entries[0].isIntersecting && !this.loading) {
              this.renderBatch();
            }
          }, { root: this.container, rootMargin: '600px' });
          this.observer.observe(this.sentinel);
        }

        renderBatch() {
          if (this.rendered >= this.data.length) return;
          this.loading = true;
          const end = Math.min(this.rendered + this.batchSize, this.data.length);
          const fragment = document.createDocumentFragment();
          for (let i = this.rendered; i < end; i++) {
            const wrapper = document.createElement('div');
            wrapper.innerHTML = this.renderItem(this.data[i], i);
            if (wrapper.firstElementChild) fragment.appendChild(wrapper.firstElementChild);
          }
          this.list.appendChild(fragment);
          this.rendered = end;
          this.loading = false;
        }

        setData(newData) {
          this.data = newData;
          this.rendered = 0;
          this.list.innerHTML = '';
          this.container.scrollTop = 0;
          if (this.data.length === 0) {
            this.list.innerHTML = '<div class="empty">暂无消息</div>';
            return;
          }
          this.renderBatch();
        }

        scrollToTime(timestamp) {
          const idx = this.data.findIndex(item => item.t >= timestamp);
          if (idx === -1) return;
          // Ensure all messages up to target are rendered
          while (this.rendered <= idx) {
            this.renderBatch();
          }
          const el = this.list.children[idx];
          if (el) {
            el.scrollIntoView({ behavior: 'smooth', block: 'center' });
            el.classList.add('highlight');
            setTimeout(() => el.classList.remove('highlight'), 2500);
          }
        }

        scrollToIndex(index) {
          while (this.rendered <= index) {
            this.renderBatch();
          }
          const el = this.list.children[index];
          if (el) {
            el.scrollIntoView({ behavior: 'smooth', block: 'center' });
          }
        }
      }
    

      const searchInput = document.getElementById('searchInput')
      const timeInput = document.getElementById('timeInput')
      const jumpBtn = document.getElementById('jumpBtn')
      const resultCount = document.getElementById('resultCount')
      const imagePreview = document.getElementById('imagePreview')
      const imagePreviewTarget = document.getElementById('imagePreviewTarget')
      const container = document.getElementById('scrollContainer')
      let imageZoom = 1

      // Initial Data
      let allData = window.WEFLOW_DATA || [];
      let currentList = allData;

      // Render Item Function
      const renderItem = (item, index) => {
         const isSenderMe = item.s === 1;
         return `
          <div class="message ${isSenderMe ? 'sent' : 'received'}" data-index="${item.i}">
            <div class="message-row">
              <div class="avatar">${item.a}</div>
              <div class="bubble">
                ${item.b}
              </div>
            </div>
          </div>
         `;
      };
      
      const renderer = new ChunkedRenderer(container, currentList, renderItem);

      const updateCount = () => {
        resultCount.textContent = `共 ${currentList.length} 条`
      }

      // Search Logic
      let searchTimeout;
      searchInput.addEventListener('input', () => {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => {
          const keyword = searchInput.value.trim().toLowerCase();
          if (!keyword) {
            currentList = allData;
          } else {
            currentList = allData.filter(item => {
               return item.b.toLowerCase().includes(keyword); 
            });
          }
          renderer.setData(currentList);
          updateCount();
        }, 300);
      })

      // Jump Logic
      jumpBtn.addEventListener('click', () => {
        const value = timeInput.value
        if (!value) return
        const target = Math.floor(new Date(value).getTime() / 1000)
        renderer.scrollToTime(target);
      })

      // Image Preview (Delegation)
      container.addEventListener('click', (e) => {
        const target = e.target;
        if (target.classList.contains('previewable')) {
           const full = target.getAttribute('data-full')
           if (!full) return
           imagePreviewTarget.src = full
           imageZoom = 1
           imagePreviewTarget.style.transform = 'scale(1)'
           imagePreview.classList.add('active')
        }
      });

      imagePreviewTarget.addEventListener('click', (event) => {
        event.stopPropagation()
      })

      imagePreviewTarget.addEventListener('dblclick', (event) => {
        event.stopPropagation()
        imageZoom = 1
        imagePreviewTarget.style.transform = 'scale(1)'
      })

      imagePreviewTarget.addEventListener('wheel', (event) => {
        event.preventDefault()
        const delta = event.deltaY > 0 ? -0.1 : 0.1
        imageZoom = Math.min(3, Math.max(0.5, imageZoom + delta))
        imagePreviewTarget.style.transform = `scale(${imageZoom})`
      }, { passive: false })

      imagePreview.addEventListener('click', () => {
        imagePreview.classList.remove('active')
        imagePreviewTarget.src = ''
        imageZoom = 1
        imagePreviewTarget.style.transform = 'scale(1)'
      })

      updateCount()
    </script>
